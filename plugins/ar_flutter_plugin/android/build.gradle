plugins {
    id 'com.android.library'
    id 'kotlin-android'
}

android {
    namespace "io.carius.lars.ar_flutter_plugin"
    compileSdkVersion 34
    defaultConfig { minSdkVersion 24 }

    sourceSets { main.java.srcDirs += 'src/main/kotlin' }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions { jvmTarget = "17" }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib"
    implementation "com.google.ar:core:1.22.0"
    implementation 'com.google.ar.sceneform:core:1.15.0'
    implementation 'com.google.ar.sceneform:assets:1.15.0'
    implementation 'com.google.ar.sceneform.ux:sceneform-ux:1.17.1'
    implementation 'com.google.ar.sceneform:animation:1.15.0'   // ✅ add this
    implementation 'com.google.android.gms:play-services-auth:16+'
    implementation 'androidx.appcompat:appcompat:1.3.0'
}


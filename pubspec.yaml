name: itec
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.15.2
  firebase_auth: ^5.6.3
  cloud_firestore: ^5.6.12
  socket_io_client: ^3.1.2
  mobile_scanner: ^7.1.2
  provider: ^6.1.5+1
  ar_flutter_plugin: any          # va fi suprascris de override
  vector_math: ^2.1.4
  path_provider: ^2.0.12
  permission_handler: ^12.0.1
  camera: ^0.10.5+2
  image: ^4.1.7
  tflite_flutter: ^0.12.1
  


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  ar_flutter_plugin:
    path: plugins/ar_flutter_plugin
  permission_handler: ^12.0.1
  permission_handler_android: ^13.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/